front:
  text: 洞玄靈寳三洞奉道科戒營始卷之一儀三
  hash: sha256:2efdc818575f8d31160c3a8baed3adb9c1f68aa26dcde7a458b6cc86fde88f18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0027_HFL_001-001a, image: hfl/0760/0760-126.png}
body:
  text: 金明七真撰七真曰尋三洞大經率備威儀科戒若道士若女冠舉動施為坐起卧息衣服飲食住止居處莫不具於經㫖其立觀度人造像寫經供養禮拜燒香明燈讀誦講說傳授啓請齋戒軌儀修行法相事事有則皆著科條其來已乆但文字浩漫披按頓周或一時雖見過後便忘或見而不行或行而不遍或各率乃心任情所施登壇入静各異威儀禮懴讀經人為軌則遞相指斥罕共遵行遂使晚學初門莫詳孰是既多方䘮道則寡識迷途惰慢日生威儀時替加復競為辭飾爭逞伎能啓告之辰皆興新制陳謝之日全棄舊儀𡻕月乆盈科戒遺泯積習生常十不存一若依經戒者具科行事反見嗤鄙違損正典既而昧多悟少逹竟更迷守法不精翻致訛廢眇詳先世巳其陵遲俯思今後浸成深谷故指修時要凡五百十二條儀範八章分為三卷題曰三洞奉道科戒皆依經録出非構虚詞庶萬古同軌十方共則與我齊者宜弘之焉各䟽品目列于篇首云爾罪縁品一經曰毀壞天尊大道形像者死入九幽十八地獄萬劫方生病癩身經曰訾毁三洞大法經典者死歷九幽十八地獄百劫方生野獸身若還人中當舌根爛壞經曰誹謗出家法身者見世得蟲癩病過去生六畜中經曰破壞靈觀玄壇者見世眉鬚墮落身體爛壞過去生毒蛇身經曰不敬天尊大道者見世愚癡過去生六畜中經曰不信經法宿命報對者見世盲聾過去生鳥獸中經曰不信罪福因縁者見世為奴婢過去生六夷中經曰輕慢出家法身者見世跛躄過去生豬狗中經曰穢汙三寳福地者見世形容臭腥過去生糞穢中經曰婬犯出家法身者見世孤寡為人憎嫌過去生廁溷中經曰邪婬好色者見世患風邪過去生猳豬中經曰偷盜三寳財物者見世受貧窮過去生奴婢六畜中經曰偷盜常住衆物者見世得風病過去生豬羊六畜中經曰偷盜四輩信施財物者見世得顛狂過去生愚癡中經曰啖食三寳果實蔬菜者見世得消渴飢病過去生餓虎毒蛇中經曰盜齋食及供齋法食者見世逢霹靂惡鬼殺過去生蟒蛇身死在餓鬼中經曰盜供齋物者見世生奴婢中飢寒永不得衣食過去生餓狗毒蛇中經曰盜經像財物者見世得癩病死入諸地獄萬劫不得原經曰罵詈出家法身者見世得風癎過去生狂狗中經曰凌辱出家法身者見世遭枷落獄過去生蠅蛆中經曰破戒者見世遇三災過去生毒蜂及聾盲中經曰破齋者見世得噎病過去生餓虎中經曰殺害衆生者見世得短命長宿牢獄戹身過去生六畜中經曰食肉者見世生百病過去生麋鹿中經曰嗜酒者見世生風狂逢猛火過去生泥穢土中經曰好食葷辛穢者見世得腥臭身過去生糞穢中經曰持心不堅固好弄出家人者見世為猴猨死入鑊湯中經曰手脚攣跛者從不禮敬三寳中来經曰手脚斷壞拳縮者從不恭敬三寳中来經曰兩眼盲者從不信經法輕忽三寳中来經曰中道惡疾者從供養三寳中怠中来經曰舌爛壞者從毀訾三洞大乗經教中来經曰瘖瘂不能言語者從道說出家三寳法身中来經曰鼻塞不聞香臭者從好啖酒肉五辛中来經曰身體爛壞者從毁壞三寳中来經曰眉毛墮落者從誹謗三寳中来經曰脣褰齒露鼻梁崩倒者從破壞道場中来經曰曲腰歧胷僂背短脚者從嗊嗃欺忽三寳中来經曰顛狂風邪迷惑者從不信因縁罪福中来經曰形容瘡腫醜陋者從罵詈三寳中来經曰眼赤口斜鼻傾不正者從誹𥬇出家法身中來經曰愚癡長病意智不具足者從誑惑三寳欺忽中来經曰劫賊相逄殺傷財物者從劫奪三寳財物中来經曰水溺漂沉者從飲酒穢慢中来經曰火燒灼爛者從損費三寳中来經曰毒蛇吞噬者從殺傷出家中来經曰毒蛇入口鼻中者從毒惡呪詛中来經曰遇虎狼猛獸啖食者從隂謀毒惡中来經曰飢寒凍餓衣食常不充足者從盜齋食及偷三寳常住財物中来經曰父母妻子離隔常不同居者從嫉妬姦婬破人和合離人種親中来經曰貧窮困苦者從破齋戒中来經曰奴婢下賤身者從偷盜慳貪中来經曰生世得人憎嫌者從憍慢唝嗃中来經曰生世躭婬不避親踈好醜者從豬狗六畜中来經曰生世嗜酒猖狂者從魚鼈鍜蟇中来經曰生世嗜肉好殺者從毒蟲猛獸中来經曰生世不淨臭穢者從蝌蚪蟲中来經曰身體臭穢不淨邪淫者從好食五辛豬狗中来經曰六畜生身者從殺生抵債中来經曰野獸麞鹿身者從食肉偷盜中来經曰毒蠎蛇身者從嫉妬毒害中来經曰餓虎生身者從欺凌劫奪中来經曰生廁溷中蟲者從婬欲不淨中来經曰生蝦蟇蝌蚪者從不供養三寳中来經曰生魚鼈身者從輕洩寳經中来經曰生小蟲螘身者從違犯經教中来經曰生猘犬野豬身者從背師棄本中来經曰生鷰雀身者從評論經教多口中来經曰生鳩鴿身者從好自是作法異常中来經曰生鷹驇身者從破戒違經慢法中来經曰生孤獨貧寒者從犯出家法身及墮胎害子中来經曰形容醜陋者從誹笑三寳傲誕出家中来經曰風邪癎病狂言者從布施不還及墮子落胎中来經曰腹大項細者從犯靈觀玄壇婬欲中来經曰牢獄枷鎻切身者從謟毒阿黨中来經曰鞭棒楚撻者從毒害衆生不慈中来經曰猫子生身者從食肉入靈觀玄壇中来經曰蝜蟠生身者從食葷辛近三寳中来經曰豺狼生身者從慳恡不布施中来經曰狐狢生身者從虚誑矯詐中来經曰䑕鼬生身者從食齋殘竟飲酒食肉中来科曰凡八十一條罪業因縁科戒出太上業報因縁經皆生犯罪目死經地獄依科受罪報訖受生方得此身亦有見世即報而生身者悉由先身所犯報得此身也具諸經典若道士若女冠皆當精心信奉明示將来令内外衆不犯科戒克得道真善縁品經曰廣造經像置觀度人布施齋戒濟死度生者普救一切大弘福善利益衆生者生天王國主身經曰持經奉戒誦念禮拜廣建福田者生皇后國毋身經曰供養三寳燒香明燈晨夕不倦造經鑄像者得生天王門經曰信樂經法依科奉行持齋念道布施立功者生富貴身經曰持奉經戒誦念住持者生聦明身經曰七世樂道奉戒誦經布施救貧濟生度死常行慈悲供養三寳不怠倦者得生出家身經曰世世積善廣建福田持齋奉戒禮敬三寳誦念大乗修行不犯者得生大徳法師衆人尊仰身經曰奉信三洞大法修行供養者生天人中見世清淨長命身經曰供養出家法身者得長命端正身經曰成就觀宇玄壇者生大富貴身經曰信敬天尊大道注心歸仰者生具足身經曰信奉經戒因縁宿命者生貴敬身經曰布施救貧成就功徳無所吝者生中國長夀冨貴身經曰不殺生偷盜飲酒食肉者生長命具足身經曰好誦經戒長齋奉道者生出家恭敬身經曰供養出家愛念三寳法身者生清淨端正身經曰常憐念一切慈悲於物者生髙上貴豪身經曰若帝王國主從累劫修齋廣䢖福田中来經曰若皇后國母者從無量世中廣造福田供養天尊大道中来經曰帝子天孫帝姫妃主者從歷劫修善積因中来經曰長命老夀者從持齋奉戒慈救衆生中来經曰子孫昌熾長命富貴者從供養天尊大道中来經曰父子夫妻男女恒同居處者從柔順和睦不隔恩愛中来經曰在䖏得人敬仰甘膳羙衣衣充身食足口者從陪常住福田中来經曰豪貴尊勝人見畏敬者從敬信三寳中来經曰富有豐足者從布施持齋成就福田救濟貧窮中來經曰聦明智慧者從樂誦經法能住持中來經曰形容端正者從供養三寳出家法身中來經曰出家法身爲人敬奉者從說法教化持奉齋戒福田中來經曰富貴巍巍永劫不衰者從布施成就常住福田中來經曰在所得人尊敬愛仰者從布施持經奉戒中來經曰身心清淨智慧明了者從護持三洞大乗中來經曰所在快樂無諸災厄者從放生濟物不犯衆生中來經曰身體香潔人見愛念者從不飲酒食肉葷辛常清淨中來經曰子孫豐多富貴圎滿者從廣行布施求福中來經曰婦人建生子胤夫妻敬愛者從道場教化信心中來經曰生世音聲清雅者從道場歌讃中來經曰生世歡樂福慶自然者從道場專誠聞法聴經布施中來科曰凡三十八條福善縁封出太上業報因縁經皆生世或祖曽所行所種致得今身之報或一身積善見世受報若道士若女冠當須依科明示男女使遵科戒得福无量總例品三科曰按玄都律及正一法文凡道士女冠或凡人違犯經戒皆奪筭或言減促筭者謂奪減人之命筭令夀不延也或以六十日為一筭二說有異故具言之又減奪筭後身死或見存皆更依科目受罪奪減命筭而巳益筭者加其筭使更延也若道士女冠須識科戒按法奉行科曰或言犯違科罪得違罪者皆依本科目得罪也置觀品四科曰夫三清上境及十洲五嶽諸名山或洞天并太空中皆有聖人治處或結氣為樓閣堂殿或聚雲成臺榭宫房或處星辰日月之門或居煙雲霞霄之内或自然化出或神力造成或累劫營修或一時建立其或蓬萊方丈圎嶠瀛洲平圃閬風崐崘玄圃或玉樓十二金闕三千萬號千名不可得數皆天尊太上化跡聖真仙品都治備列諸經不復詳載必使人天歸望賢愚異域所以法彼上天置兹靈觀既為福地即是仙居布設方所各有軌制凡有六種一者山門二者城郭三者官掖四者村落五者孤逈六者依人皆須帝王營護宰臣修創度道士女冠住持供養最進善之先首不可思議者也造天尊殿天尊講經堂說法院經樓鐘閣師房歩廊軒廊門樓門屋玄壇齋堂齋厨寫經坊校經堂演經堂熏經堂浴堂燒香院昇遐院受道院精思院淨人坊騾馬坊車牛坊俗客坊十方客坊碾磑坊㝷真臺錬氣臺祈真臺吸景臺散華臺望仙臺承露臺九清臺遊仙閣凝靈閣乗雲閣飛鸞閣延靈閣迎風閣九仙樓延真樓舞鳯樓逍遥樓静念樓迎風樓九真樓焚香樓合藥堂等皆在時修建大小寛窄壯麗質朴各任力所營藥圃果圉名木竒草清池芳花種種營葺以用供養稱為福地亦曰淨居永劫住持勿使廢替得福無量功徳苐一科曰凡天尊殿或三間五間七間九間十一間或十三間皆大小在時裝嚴任力徘徊四注聖人所居稱殿凡世所處通名為堂凡造諸屋宇總有六種相一者名木靈材二者因時所出三者金玉雕飾四者甎石葺構五者丹青圖畫六者茅茨土階或刻鳳雕龍或圖雲寫月或倒芰植荷蓮池華海或明璫皎璧鏤檻文軒或丹墀碧砌青鎻緑紋或金鋪銀扄霞梁雲棟或日窓月牖隂户陽扉上限羲舒下縈霄霧其廣狹脩闊任時所為不定常式也科曰凡天尊堂或一間兩間三間五間大小寛窄亦因時所矣科曰凡法堂說法教化之所宜在天尊殿後安置務在容衆多為羙或於他䖏建立皆任其所宜也科曰凡說法院皆在天尊左右别寛廣造令容納聴衆得多為上其中屋宇皆依時取便科曰凡造經樓髙下大小華素亦任人力然要容納見在三洞寳經四輔玄文使風日流通雨露隔絶即為苐一上安置並須宜便此非永制科曰凡造鐘閣軌制與經樓同務令牢固四面踈薄使鐘聲不礙六時嘹喨宜在天尊殿前即與經樓對左鐘右經精思院别置亦然科曰凡造齋堂多在東邊别院大小寛窄量時所宜開門啓窓皆令得所當門安帳座著天尊左右鋪牀席氈褥並如法天尊前置香鑪幡華淨巾安食牀几褥並須具足如法科曰凡造齋厨宜與食堂相附近釡竈倉庫應供齋所須皆安置令不踈越科曰凡在觀中皆須先造寫經坊當别立一院勿通常人造堂或小屋若廊舍并立校經堂浴室潢竈治紙處所碪杵裁刀觧牀切蘗刀碪乃至浴中凈巾淨衣熏經敷經架修舍香臼杵器物縁所須並在經坊中安置毎事清淨不得交凡俗穢汙混雜臨事闕少此最大忌科曰凡是觀中須造浴堂乃至别院私房此最為急毎行道讀經登壇入靜奏告啓願謝過首愆外犯俗塵内違真戒或汙垢流漓灰塵染汙少不清浄則犯靈司既觸仙官便乖正氣皆須沐浴澡錬身心使香氣芬芳方可行事故行道之日皆當香湯沐浴也其縁浴所湏釡鑊井竈牀席香粉並皆具備科曰凡精思院本欲隔礙囂氛清浄滓穢須為别院置之幽靜東西南北逺近闊狹適時宜便置天尊殿入靜室錬氣處浴室藥堂縁師所須皆為備設勿使闕少科曰凡㝷真錬氣祈真吸景散華望仙承露九清遊仙凝靈乗雲飛鸞延靈迎風九仙延真舞鳳逍遥九真焚香靜念臺閣樓等並是道士女冠翹想雲衢騰誠星路逰心方外送目寰中冀八景俯臨十仙遥集既非常事理須遐絶宜近精思院或兩殿别院出廽建立遣風露不侵使雲霞無礙眇通天漢逺矚星躔外啓四景之門旁開八風之牑令仙軿出入真騎徃來可仰可希彌髙彌廣則晉携手常生撫袂旦夕可得矣科曰衆妙之門徃來之逕群真之户出入所由譬之於身若目之居面不可闕也凡諸觀門皆須造閣或立樓上安觀額以標傑出重級大小事屬一時兩下三門在時奢儉凡是别院皆須造立裝嚴雕飾各盡所宜不可守常周為定式科曰凡觀門左右皆别開車馬牛驢出入門不得於正門中來徃科曰師房在天尊殿堂周廽四方安置間架多少各依當時所造科曰凡道士女冠入道即須受持經戒符籙須别作受道院造壇及對齋堂靜室縁法所須皆備此院科曰凡道士女冠身亡皆别置昇遐院須别立一院造堂室供器所須皆備此院科曰凡道士女冠死法衆同義湏相開度宜近昇遐院造燒香院安几席牀座一事巳上備此院内科曰凡觀天尊殿前皆須築土或壘甎砌石若構木作壇三級五級至十二級皆按本經欄纂門牓並須如法科曰凡是殿堂樓閣臺榭引院並須作行廊歩廊軒廊房宇使四面周帀科曰凡淨人坊皆别院安置門户井竈一事巳上並不得連接師房其有作客赤在别坊安置科曰凡車牛騾馬並近淨人坊别作坊安置不得通同師房及齋厨院内出入并近井竈科曰凡十方道義或為法或縁身來詣觀中所將人畜皆别安置不得師例須别立客院若未有别院即安淨人坊驢騾置驢騾坊所損常住皆須陪填不得直爾師同法衆例科曰凡有俗客或門徒若本部宫人皆别安俗坊所將人畜並不得侵損常住若贖者住科曰凡藥者救病所須當别立藥圃栽蒔當處所有科曰華果供養之先繞觀院内及廊舎内外皆栽花果珍草以時收採供養三寳科曰凡菜齋食所資當除五辛之外時有名菜𤓰瓠之屬皆須種植科曰莊田碾磑常住所資隨處訪求依法置立其中區别淨穢檢校營為皆適當時務令得所科曰凡出家之人務存清素逺棄驕奢須從儉省所居之處皆不得華麗靡曼牀席器玩並須敦朴不得同俗使内外開通表裏无擁不得以簾幔帷幌而自隱藏其繩牀凡拂如意香鑪法具常安左右凡諸非法器服玩弄皆不得畜此道士之重戒科曰凡觀皆須别造一院屋宇如法擬供修造天尊等功徳所須浴室釡竈之屬並備其内科曰凡天尊殿堂及諸别院私房内外皆種果林華樹緑竹清池珍草名香分階列砌映帶殿堂蒙籠房宇使香起靈風華明慧日時歌好鳥乍引髙真上擬瑶䑓下圖金關契心之所是焉棲記洞玄靈寳三洞奉道科戒營始卷之一
