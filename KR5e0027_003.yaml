front:
  text: 洞玄靈寳三洞奉道科戒營始卷之三四同卷
  hash: sha256:e4ecea4c2dbda709de8084282acb107cebca6bde23f8635c9d4266daafa72411
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0027_HFL_003-001a, image: hfl/0761/0761-004.png}
body:
  text: 法具品科曰凡法具供養之先道士女冠威儀之本不可闕也並備諸經但在觀中及私房内供養之者總名法具科曰凡鐘者四衆所㑹六時急務此器若闕則法集乖軌經曰長齋㑹玄都鳴玉扣瓊鐘又法皷㑹群仙靈唱靡不同是也凡有五種造一者金鐘二者銀鐘三者五金合鑄成鐘四者銅鐘五者鐵鐘或九角八角或四角兩角復有無角或大則萬石小則一斗各在時耳既造成巳皆須鐫勒銘記國號年嵗郡縣觀名所為之意使萬代有歸六時不替矣科曰凡磬以節度威儀容止所要有六種相一者玉二者金三者銀四者銅五者鐵六者石或兩角四角或九角無角或狀若鈎並題所識永為供養凡鐘磬皆須作虡懸之科曰凡天尊殿堂及諸安置經像處所皆須造帳座幡蓋旌斾節輿香鑪華珮几案帕縟幡竿燈臺燈檠燭檠燈籠壇纂門牓香合法具事事種種或羅綺錦縵飾金琢玉翠羽翡毛丹青珠璧琉璃玳𤦛連貫填錯七寳九光三明六出華麗解淨種種如法供養天尊永世福田一不可闕當須修造最為功徳科曰凡幡有二十一種一者連金二者貫玉三者綴珠四者線銀五者繡𦂶六者織成七者雜錦八者諸羅九者錯綵十者雕鏤十一者結絲十二者叢縷十三者雲霞十四者變書十五者線作十六者純色十七者間色十八者纈畫十九者畫字二十者五色二十一者九色或長或短或闊或狹或三尺五尺七尺九尺一丈二丈四十九尺百尺千尺或一首兩首十首百首千首萬首皆隨時所辦復為亡人有遷神轉䰟度生九天三塗等幡為病人又造度厄消災解厄延年長命保護等幡居家平常復有致福延祥期年保夀修齡益筭等幡蓋任力所造皆長竿懸之於庭或經像左右并房廊院宇之側所在供養科曰凡造香鑪有一十五種相一者雕玉二者鑄金三者純銀四者鍮石五者鑄銅六者柔鐵七者七寳八者雕木九者彩畫十者純漆十一者瓷作十二者瓦作十三者石作十四者竹作十五者時作皆大小隨時舞鳳盤龍飛雲卷霧或蓮華千葉香山或復雕鏤隠起或朴素平縵三足六足九足獨足各隨所宜也科曰凡造巾帕有八種一者雜錦二者雜羅三者雜綾四者織成五者繡作六者錯絲七者純色八者畫作皆大小在時脩短任制或鏤金垂玉連珠綴蘂種種裝飾皆襆褁藏諸匣匱矣科曰凡經毎一部或五卷十卷皆須著裘凡袠有五種一者錦綺二者織成三者繡作四者純綵五者畫繪皆内安裏及帶如法皆書題曰某經科曰經函凡有十二種一者雕玉二者純金三者純銀四者金鏤五者銀鏤六者純漆七者木畫八者彩畫九者金飾十者寳裝十一者石作十二者鐵作大小任宜科曰凡經厨有六種一者寳裝二者香飾三者金銀隱起四者純漆五者沉檀六者名木大小在時科曰凡造經藏皆外漆内裝沉檀或表裏純漆或内外寳裝或表裏彩畫或名木純素各在一時大小多少並隨力辦或作上下七重或三重並别三間或七間安三洞四輔使相區别門上皆置鎻鑰左右畫金剛神王悉須作臺安不得直爾頓地科曰凡講經座髙九尺方一丈四脚安牙版裙朱漆或木素皆畫金剛神王或十座百座並須有偶安閣道欄楯並須如法科曰凡常讃經座髙五尺方亦如之與講座同軌制裝飾與講座等科曰凡經架有十種一者玉作二者金作三者銀作四者沉水五者紫檀六者白檀七者黄檀八者名木九者純漆十者金銀隱起或金玉珠綵裝校皆須作函藏舉勿得隨宜頓地科曰凡造天尊前案及讀經案有六種一者玉作二者金作三者銀作四者石作五者香作六者木作大小任宜其讀經案廣一尺二寸長一尺八寸髙一尺五寸種種裝校任時皆上制巾帕相稱科曰然燈之法先造燈籠周匝障蔽勿使風吹不令蟲入毎經像諸院并房門行路皆懸照明内外不得替闕科曰凡經篋函笥簡襆囊等各隨時制造珠玉錦綺羅縠各任力所為也科曰凡天尊及真人上蓋有十種一者飛雲二者翔鸞三者舞鳯四者蓮華五者仙芝六者七寳七者繡綺八者諸物合成九者純色十者綵畫皆珠玉珮帶流蘇垂鈴貫玉隨時所建若道士女冠所持但翠碧八角或四角圓方任時垂帶曲柄自揜而巳故手執晨華是也科曰輦輿車軿皆仙聖所御供養威儀如今王者所建也科曰旌節幢斾亦神仙所持既具經典即威儀之限如今國家所制也科曰凡華𣗳華籠導引所須毎觀須造作架挿天尊前纸籠勿使損汙有闕減筭一百八十科曰凡燒香火鑪并蓋合火七筯杴火鉢灰節盛炭器籠炭九罩灰繖拭鑪巾火七筯架合炭九器調度各隨宜作安天尊殿或左右小屋中違減筭六百八十科曰凡繩牀夾膝如意曲凡塵拂澡灌雖非天尊左右急須亦道士女冠供養切要並隨時造備不得闕替法服品科曰道士女冠三洞法服各有儀制具如本經當依法制服具依下卷其山文霞納暈畫等帔無擬天尊身上九色離羅之狀講說三洞大乗敷揚妙道陞髙座大徳法師所服若具上法登壇入靜告齋行道啓導之首及常修經法或傳授經戒威儀所須聴臨事暫披事竟還罷除此之外皆不得輒服減筭一千二百科曰凡諸女冠裙皆全幅帖縁染用桅黃深色綽䄂如道士制皆不得淺淡雜色違減筭二百四十科曰道士女冠執役衣先不具科今備出之其上中下衣皆用淺黃色若黃屑土黄作淡色短小稱身制之若在觀居房供養師主尊年耆徳或修飾經像執捉營為皆服此衣名為執役若道士女冠裩袴衫𥜗並作黄屑色不得餘色及白違減筭三百六十科曰道士女冠皆有冠幘名有多種形制各殊具在經中具如下卷並用穀皮筍籜或烏紗純漆依其本制皆不得鹿皮及珠玉綵飾其簪聴用牙玉骨角亦自須依法皆函笥盛舉勿使顯露及俗人犯觸違減算二百六十科曰道士女冠履制皆圎頭或二儀像以皮布絁絹裝飾黃黑其色皆不得羅綺錦繡畫繡間錯珠條隱帖及俗履或青紫錦繡其襪並須純素絁布絹為之其鞾圎頭闊底鞵唯麻而巳自外皆不得著違奪筭二百四十科曰凡道士女冠卧具皆用絁布絹染作黃屑或淺槐色若青緑碧緋紫錦綺纈雜暈綵皆不得服用其氈席牀褥悉皆如之褥聴用紫碧褐等枕用木或純漆正四方作之不得斜曲為異形或承髻金銀雕飾皆下鋪淨巾違奪筭三百六十科曰凡道士女冠體佩經戒符籙天書在身真人附形道氣營衛仙靈依託其所著衣冠名為法服皆有神靈敬護坐卧之間特宜清淨或赴縁入俗教化人間不可將我法身混同俗事凡人狀席穢氣稍多衣服尊卑自須分别須各作坐褥方四尺表裏帖縁大徳尊者法師及具上法者用紫餘皆𩲡色並不得以錦綺珠條帖絡出入隨身若入俗間則不用也違奪筭三百六十居處品科曰道士女冠居處鋪牀宜依四壁單行不得前後合鋪若坐若卧皆獨處一牀違奪筭一百二十科曰道士女冠坐卧處皆不得施帳座屏風障子若屋宇穿漏風塵出入聴作青布縵或縵帳周匝而巳違奪筭一百二十科曰凡道士女冠居處唯虚淨素朴而巳除曲几夾膝如意塵拂香鑪香合經案巾帕函笥坐褥繩牀經藏燈臺衆生食盤澡灌等非法器玩具皆不合畜用違奪筭三百六十科曰道士女冠食器有五種相一者純漆二者銅作三者石作四者鐵作五者瓦作皆三重大者五升中者三升小者一升五合衆生食盤或鉢一容半升匙挾銅漆餘並不得充用淨巾二唯供齋堂所用自他所及他用悉不得常須清淨名曰齋器毎洗拭安架笐勿雜他器違奪筭二百八十科曰道士女冠房内皆須造浴室内外密淨凡犯穢及汗垢即浴違奪筭一百二十科曰凡道士女冠居住先須有泉井毎令清淨勿使穢雜及六畜屍産穢凡用水皆先濾後用違奪筭一百二十科曰凡道士女冠居處先須備澡灌注椀或盆器貯淨水舉動運為須漱口沈手其器金銀銅瓦任時所有皆安蓋無使風塵蟲物穢汙兼淨巾相覆違奪筭八十科曰凡道士女冠居處先須造廁當隨土深淺上造小屋使表裏密淨不得露見穢汙違奪筭一百二十洞玄靈寳三洞奉道科戒營始卷之三
