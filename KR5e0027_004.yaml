front:
  text: 洞玄靈寶三洞奉道科戒營始卷之四
  hash: sha256:db8d8b394cddec61aa0f2e708d6879d5b8dd1cadf29fbefe73c8b4214794bbe6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0027_HFL_004-001a, image: hfl/0761/0761-024.png}
body:
  text: 誦經儀初入堂祝潄如法三上香繞經一周復三上香各依位拱手或執簡端身唱人各恭敬至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師唱平坐如法行淨水記一人持香旋行熏淨訖行經復持香熏經乃唱讃詠如法呪曰宿命有信然弱喪謂之無皆欲眼前見過目則言悠大賢明道教慘戚憫頑夫哀哀念子苦勤勤令我憂次唱靜念如法各放手簡著几案上平坐接手叩齒三十六通冥曰存思五色雲氣覆滿一室青龍白虎獅子玄龜朱雀鳯凰備守前後仙童玉女五帝靈官神仙兵馬九億萬衆營衛左右便搖身三過祝曰寂寂至無宗虛峙劫刃阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不死欲生因蓮華超凌三界塗慈心解世羅真人無上德世世為仙家次唱一切誦各念無上尊七遍訖唱請轉法輪乃一時開經若别推一人上座誦經便唱請法師升髙座法師起執簡當經像三禮從南西北向上座左轉東向叩齒有思如法下座還從南面下三拜此洞玄法餘洞真洞神各依本法若修行經法者復各案本科今不復具讀經竟收經一人行水灑淨復持香旋行斂淨總記讃詠如法唱人各恭敬三上香執簡平立至心歸命太上三尊十方衆聖髙德一人歎經啓願詳夫三洞寶經萬天勝範結飛玄之氣成雲篆之章義冠無生文垂永劫故天地持之以分判日月因之以運行鬼神敬之以變通人民奉之以開度是以詠之者則形陟絳霄聞之者乃神生碧落莫不人天仰賴生死依慿為群品之津梁實衆真之戶牖不可得而言者其大乘之藴乎甲等今為某事轉某經若干卷若干遍爾其開函演奧則響徹三千執卷吟玄乃聲聞五億當願侍香金媛結香字於天中典經玉郎進經文於簡上即使愆消昔劫福降今辰存亡喜開泰之恩動植悅生成之德以兹勝善遍釆裝嚴三塗罷楚毒之勞九夜絶辛酸之苦暨乎悠悠庶品蠢蠢群生俱乘六度之舟並上三清之岸願轉經巳後萬善扶持千災蕩滅至心稽首正真三寶願轉經巳後福被幽明功沾逺近至心稽首正真三寶願以此轉經功德資被群生離苦解脫至心稽首一切衆聖若常修經法當旋行誦太極經讃七首靈書四天王頌四首及真文八景讃上經歌頌今不復具科曰凡讀誦經依此儀違奪算二千四百講經儀法師盥潄冠帶如法弟子持香花拜請導引一如科說法師登經像前席端立執香爐當心訖唱人各恭敬歸依大道當願衆生解悟正真發無上心歸依經法當願衆生智慧洞開深廣如海歸依玄師當願衆生辨幽釋滯並弘正道法師登閣道平立唱平坐如法待法師三上香竟復唱靜念如法又存念訖唱譛詠如法呪曰寂寂至無宗虛峙劫刃阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不死欲生因蓮華超凌三界塗慈心解世羅真人無上德世世為仙家次唱請轉法輪復唱一切誦普誦無上尊七遍都講便叙經唱經法師皆約敕座下禮經一拜按文解釋罷講作安和樂未央聲每講罷法師執香爐捻香願以此講經功德莊嚴皇帝太子諸王公侯牧伯州縣令長天下人民講經信士見在法徒一切衆生三塗苦輩籍此善根悉得體解大乘歸心正道咸出愛河俱遊法海更唱人各恭敬至心歸命太上三尊十方衆聖願皇帝百福莊嚴萬善雲集至心稽首正真三寶以此講經功德資被群生離苦解脫至心稽首禮得道衆聖依法弟子香花送法師至本處禮拜如法料曰凡講經皆依此法違奪算一千二百法次儀科曰道士女冠法位次第稱號各有階級須知尊卑上下不得叨濫今具之于下宜熟詳之違各奪算一千二百科曰道民賢者信士善男子善女人行者皆是道士女冠美前人之稱非是詞狀控告之限即法師大德尊師上人是外屬男子美出家之稱亦非啓奏表請之宜又如貧道是出家之謙詞弟子是在俗之卑稱復非三寶前所用此又異三洞弟子法師之稱宜熟詳之今備具之男人女人即常人未衆經戒之稱也户長輸誠於道係名户籍者也大道弟子天尊弟子三寶弟子歸心大道勤經教者得加此號也清信弟子受天尊十戒十四持身或十二可從六情等戒得加此號也男生女生七嵗八嵗受更令一將軍籙得加此號籙生十嵗巳上受三將軍符籙十將軍符籙三歸五戒得加此號料曰凡十號男女詞告啓奏得稱此號於天尊大道前皆下言某甲不得直爾違奪算三百六十正一法位童子一將軍籙三將軍籙十將軍籙籙生三戒文正一戒文七嵗八歲或十歲巳上受稱正一籙生弟子七十五將軍籙百五十將軍籙正一真卷二十四治正一朝儀正一八誡文受稱某治氣男官女官黃赤劵契黃書契令五色契令八生九宫契令真天六甲劵令真天三一契令五道八劵受稱三一弟子赤陽真人九天破殗九宫扞厄都章畢印四部禁氣六宫神符九天都統斬邪大符九州社令天靈赤官三五契三元將軍籙受稱某治氣正一盟威弟子陽平治都功版九天真符九天兵符上靈召仙靈召七星籙二十八宿籙元命籙受稱陽平治太上中氣領二十四生氣行正一盟威弟子元命真人逐天地鬼神籙紫臺袐籙金剛八牒仙籙飛步天剛籙統天籙萬文鬼籙青甲赤甲籙赤丙籙太一無終籙天地籙三元宅籙六壬式籙式真神籙太玄禁氣千二百大章三百六十章正一經二十七卷老君一百八十戒正一齊儀老子三部神符受稱太玄都正一平氣係天師陽平治太上中氣二十四生氣督察二十四治三五大都功行正一盟威元命真人洞淵神呪經十卷神呪劵神呪籙思神圖神仙禁呪經二卷橫行玉女呪印法黃神赤章受稱洞淵神呪大宗三昧法師小兆真人老子金鈕青絲十戒十四持身戒受稱老子青絲金鈕弟子老子道德經二卷河上真人注上下二卷五千文朝儀雜說一卷關令內傳一卷戒文一卷受稱髙玄