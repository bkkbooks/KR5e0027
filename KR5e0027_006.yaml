front:
  text: 洞玄靈寶三洞奉道科戒營始卷之六
  hash: sha256:bc8f4818731652253f2fcce3900a69ddb95ccff58abab8f6f34e2870621a5bad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0027_HFL_006-001a, image: hfl/0761/0761-062.png}
body:
  text: 常朝儀四衆三洞可旦夕常行所以謂之常朝若别入室朝真自依五等朝法也洗漱如法初入堂上香旋行頌曰學道當勤苦斂信運丹誠燒香歸太上真氣雜煙馨唯希開大宥七祖離幽冥三上香各依位端身執簡禮十方從東始上香訖唱人各恭敬至心歸命東方玉寶皇上天尊至心歸命南方玄真萬福天尊至心歸命西方太妙至極天尊至心歸命北方玄上玉晨天尊至心歸命東北度仙上聖天尊至心歸命東南好生度命天尊至心歸命西南太靈虛皇天尊至心歸命西北無量太華天尊至心歸命上方玉虛明皇天尊至心歸命下方真皇洞神天尊各長跪執簡當心懴悔曰衆等至心歸身無極大道天尊懴悔皇家及臣衆等一切衆生前代今身或身形所犯四肢舉措動違戒律不依經典身業大罪無量無邊因今禮懴並乞蕩除皆願衆等身入至仙㑹道合真稽首十方正真三寶衆等至心歸神無極大道天尊懴悔皇家及臣衆等一切衆生前代今身或神識所犯志念不專情浮意動馳騁不息心業大罪無量無邊因今禮懴並乞蕩除皆願衆等神合真寂洞入自然稽首十方正真三寶衆等至心歸命無極大道天尊懴悔皇家及臣衆等一切衆生或口業所犯善惡反論綺言飾非華詞惑衆口業大罪無量無邊因今禮懴並乞蕩除皆願衆等性命合道玄㑹無為稽首十方正真三寶人各平立唱一禮北向平立誦經頌曰樂法以為妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神靜默天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹眇入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰大道洞玄虛有念無不契錬質入仙真遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師一願二儀長久覆載無窮至心稽首正真三寶二願日月運行光明普照至心稽首正真三寶三願皇家宗廟先靈神升九天志心稽首正真三寶四願皇帝聖化無窮德合二儀至心稽首正真三寶五願皇儲仁孝貞明紹隆聖緒至心稽首正真三寶六願諸王兄弟文武職僚奉上盡誠安人用道至心稽首正真三寶七願天下太平兵戈止息至心稽首正真三寶八願師尊父母亡者生天見存安樂至心稽首正真三寶九願衆等慧業日新智燈無盡至心稽首正真三寶十願十方施主凡厥有緣俱捨苦因咸登道岸至心稽首正真三寶十一願法界威靈金剛力士用道神通攝邪歸正至心稽首正真三寶十二願三塗五苦法界衆生並出欲纒同升福岸至心稽首正真三寶詠學仙頌學仙行為急奉戒制情心虛夷正氣居仙聖自相尋若不信法言胡為棲山林科曰凡朝依此儀違奪算一千二百中齊儀時至澡漱供養悉如法唱人各恭敬至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師行道行香一切衆官誦無上尊行香頌曰道以齊為先勤行登金闕故設大法橋普度諸人物宿世恩德報道心超然發身飛升玄都七祖咸解脫至心稽首太上三尊十方衆聖齊官長跪歎道功德原夫無色之巳示妙色於人間無身之身見真身於象外故能形分百萬變化無窮影散億千隨迎莫測由是慈周法界則劫劫度人德被塵沙乃方方教化或遊行八十一國化被西戎或在世九百餘年導兹中夏普使人天悟道長登解脫之門生死歸真並出輪回之浪然後神凝金闕獨為萬聖之宗體妙瓊都髙步九清之上是知天上天下三界十方巍巍最尊惟吾大道今日齊官某甲為某事修營妙供以薦微誠歸命十方䖍心三寶當願神通自在俯念衆生妙應無邊仰垂慈澤即使飛天下降示罪福之科妙行齊臨按因緣之格塵沙咎纍並乞消除浩劫愆尤皆蒙蕩滌見在善根增長共騫𣗳以同年過去惡業消亡等香林之受樂慿兹勝福普暨無窮九幽絶悲痛之魂六趣罷輪回之識逮乎凡諸品彚普是含靈俱超愛欲之河並陟逍遙之岸願齊官七世父母神生淨土勝報無窮至心稽首正真三寶願齊官宅舍安寧闔門和睦至心稽首正真三寶願齊官子孫昌熾世出賢明至心稽首正真三寶願齊官罪纍蕩除福慧圎滿至心稽首正真三寶願天下太平萬姓安樂至心稽首正真三寶願一切衆生免離諸苦同入正真至心稽首得道衆聖平坐如法施食呪願曰此受食呪一切作福田施食最為先見世受快樂過去得生天當來居淨土衣食常自然是故今供養普獻於諸天食遍齊供手呪曰香厨妙供上獻天尊中獻真聖下及衆生普同飽滿福流齊官如水歸海食訖施食懴食曰上啓十方天尊敬白見前大衆弟子今日所營齊供或恐手觸不淨衣服不淨器物不淨米麥不淨事事種種多不如法願三寶弘慈布施歡喜殘有供具回施一切當願施者得福食者無罪齊官捻香供養如法唱讃詠如法為諸來生作善因緣如蒙開悟仰受聖恩次齊官持淨施云布施呪願上啓十方三寶一切真聖齊官某甲為某事設齊已訖猶恐功德未圎更捨淨財回施三寶當願布施巳後七祖生天見存快樂世世生生得福無量次唱持念人各恭敬至心稽首太上三尊十方衆聖願齊官百福裝嚴萬善歸集至心稽首正真三寶以此設齊功德資被群生離苦解脫至心稽首禮得道衆聖科曰凡一中齊依此儀違奪算一千六百中㑹儀入道户呪漱捻香叩齒並如行道法發爐呪曰無上三天玄元始氣太上老君召出臣身中三五功曹左右官使者侍香玉童傳言玉女五帝直符各三十六人出關啓此間土地里域真官正神今故燒香願得太上十方正真妙氣降注臣身中令所啓速逹徑詣至真無極道前稱名位太上靈寶洞玄法師某嶽真人某上啓太上無極大道至真無上三十六部尊經玄中大法師三界官屬一切威靈今故燒香願以是功德歸流某家九玄七祖見前人口乞丐原赦前生今身一切所犯元逆醜惡兆罪億過悉乞除蕩即願亡者上生天堂衣飯自然見存災消禍滅長居福慶善緣之中門户清貴子孫昌熾世世享祚萬願從心今故燒香克獲感通徑至無極道前至心稽首東方無極太上靈寶天尊十方同次南次西次北次東北次東南次西南次西北次上方次下方誦三契頌至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師重稱名位太上洞玄靈寶法師某嶽真人某上啓太上無極大道三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切真靈某等今故捻香願為某懴謝無量劫來至于今日生死宿罪重過或違天犯地輕慢三寶殺害衆生罵詈呪詛嫉妬慳貪邪淫放蕩愚癡竊盜口是心非三業六根罪愆無量因今首謝並乞消除願亡者生天見存安樂子孫昌熾福慶自然暨乎天下地上五苦三塗咸出幽牢俱蒙惠潤凡諸有識並入道場謹啓二上香復爐呪曰香官使者左右龍虎君侍香諸靈官當令此間朝㑹之所自然生金液丹碧芝英百靈衆真交㑹集在香火案前十方仙童玉女侍衛香煙傳奏臣向來言啓徑至無極道前旋行頌出道以齊為先勤行登金闕故設大法橋普度諸人物宿世恩德報道心超然發身飛升玄都七祖咸解脫科曰凡中㑹依此儀違奪算一千六百度人儀齊時未至應度人列階下西面辭父母謝九玄合十二拜次北面拜天子四拜所以者冠帶天尊法服更不復拜父母國君故也於此入道之際須辭謝耳既訖拱手端身北向三歸三寶三禮至心歸身太上無極大道至心歸神三十六部尊經至心歸命玄中大法師回面西禮監度三師各三拜訖便長跪先保舉師為著法裙次監度師為著雲䄂次度師為著法帔然後便為戴法冠畢退禮三師三拜北面執簡端立師面東平立誦智慧三首其詞曰智慧起本無朗朗超十方結空峙玄霄諸天挹流芳其妙難思議虛感真實通有有竟不有無無無不容智慧恆觀身學道之所先眇眇入玄津自然録我神天尊常擁護魔王為保言晃晃金剛軀迢迢太上清智慧生戒根真道戒為主三寶由是興髙聖所崇受泛此不死舟倐歘濟大有當此說戒時諸天並稽首每至首終齊唱善禮一拜總訖回身禮十方從北始至心歸命北方無極太上靈寶天尊十方同次東次南次西次東南次東北次西南次西北次上方次下方次退居東面西師西面東向為說十戒新度人皆稱名受天尊言善男子善女子能發自然道意來入法何受我十戒則為大道清信弟子皆與勇猛飛天齊功於是不退可得超凌三界得為上清真人汝當伏受諦聽在心一者不殺當念衆生二者不淫妄行邪念三者不盜取非義財四者不欺善惡反論五者不醉常思淨行六者宗親和睦無有非親七者見人善事心助歡喜八者見人有憂助為作福九者彼來加我志在不報十者一切未得道我不有望天尊言修奉清戒每合天心常行大慈願為一切慊慊尊教不敢中怠寧守善而死不為惡而生於此不退可得拔度五道不履三惡長齊奉戒自得度世新度人禮師三拜北向禮二尊三拜誦奉戒頌其詞曰道為無心宗一切作福田立功無定主本願各由人虛己應衆生注心莫不均大聖弘至教亦由雨降天髙陵靡不周常卑故成淵海為百川王是能合龍鱗萬劫保智用豈但在厥年奉戒不暫𧇊世世善結緣精思念大乘㑹當體道真科曰凡度人依此儀違奪算一千二百科曰凡八儀道士女冠行事所要指擲時須集成此卷當依而奉之違四司考魂不復名上道科奪算二千四百洞玄靈寶三洞奉道科戒營始卷之六
