front:
  text: 洞玄靈寳三洞奉道科戒營始卷之六
  hash: sha256:eeb45069a7d454dfb1b72106d58d6bfeab7fcaa634568a89bf580191ff7d26d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0027_HFL_006-001a, image: hfl/0761/0761-062.png}
body:
  text: 常朝儀四衆三洞可旦夕常行所以謂之常朝若别入室朝真自依五等朝法也洗漱如法初入堂上香旋行頌曰學道當勤苦歛信運丹誠燒香歸太上真炁雜煙馨唯希開大宥七祖離幽冥三上香各依位端身執簡禮十方從東始上香訖唱人各恭敬至心歸命東方玉寳皇上天尊至心歸命南方玄真萬福天尊至心歸命西方太妙至極天尊至心歸命北方玄上玉晨天尊至心歸命東北度仙上聖天尊至心歸命東南好生度命天尊至心歸命西南太靈虚皇天尊至心歸命西北无量太華天尊至心歸命上方玉虚明皇天尊至心歸命下方真皇洞神天尊各長跪執簡當心懴悔曰衆等至心歸身无極大道天尊懴悔皇家及臣衆等一切衆生前代今身或身形所犯四肢舉措動違戒律不依經典身業大罪无量无邊因今禮懴並乞蕩除皆願衆等身入至仙㑹道合真稽首十方正真三寳衆等至心歸神无極大道天尊懴悔皇家及臣衆等一切衆生前代今身或神識所犯志念不專情浮意動馳騁不息心業大罪无量无邊因今禮懴並乞蕩除皆願衆等神合真寂洞入自然稽首十方正真三寳衆等至心歸命无極大道天尊懴悔皇家及臣衆等一切衆生或口業所犯善惡反論綺言飾非華詞惑衆口業大罪无量无邊因今禮懴並乞蕩除皆願衆等性命合道玄㑹无為稽首十方正真三寳人各平立唱一禮北向平立誦經頌曰樂法以為妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神靜黙天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹緲入大乗因心立福田靡靡法輪昇七祖生天堂我身白日騰大道洞玄虚有念无不契錬質入仙真遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師一願二儀長乆覆載無窮至心稽首正真三寳二願日月運行光明普照至心稽首正真三寳三願皇家宗廟先靈神昇九天志心稽首正真三寳四願皇帝聖化无窮德合二儀至心稽首正真三寳五願皇儲仁孝貞明紹隆聖緒至心稽首正真三寳六願諸王兄弟文武職僚奉上盡誠安人用道至心稽首正真三寳七願天下太平兵戈止息至心稽首正真三寳八願師尊父母亡者生天見存安樂至心稽首正真三寳九願衆等慧業日新智燈無盡至心稽首正真三寳十願十方施主凡厥有縁俱捨苦因咸登道岸至心稽首正真三寳十一願法界威靈金剛力士用道神通攝邪歸正至心稽首正真三寳十二願三塗五苦法界衆生並出欲纒同昇福岸至心稽首正真三寳詠學仙頌學仙行為急奉戒制情心虚夷正氣居仙聖自相尋若不信法言胡為棲山林科曰凡朝依此儀違奪筭一千二百中齋儀時至澡漱供養悉如法唱人各恭敬至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師行道行香一切衆官誦無上尊行香頌曰道以齋為先勤行登金闕故設大法橋普度諸人物宿世恩徳報道心超然發身飛昇玄都七祖咸解脫至心稽首太上三尊十方衆聖齋官長跪歎道功徳原夫无色之巳示妙色於人間无身之身見真身於象外故能形分百萬變化无窮影散億千隨迎莫測由是慈周法界則劫劫度人徳被塵沙乃方方教化或遊行八十一國化被西戎或在世九百餘年導兹中夏普使人天悟道長登解脫之門生死歸真並出輪廻之浪然後神凝金闕獨為萬聖之宗體妙瓊都髙歩九清之上是知天上天下三界十方巍巍最尊惟吾大道今日齋官某甲為某事修營妙供以薦微誠歸命十方䖍心三寳當願神通自在俯念衆生妙應无邊仰垂慈澤即使飛天下降示罪福之科妙行齊臨按因縁之格塵沙咎累並乞消除浩劫愆尤皆蒙蕩滌見在善根増長共騫𣗳以同年過去惡業消亡等香林之受樂慿兹勝福普暨无窮九幽絶悲痛之䰟六趣罷輪廻之識逮乎凡諸品彚普是含靈俱超愛欲之河並陟逍遥之岸願齋官七世父母神生淨土勝報无窮至心稽首正真三寳願齋官宅舎安寜闔門和睦至心稽首正真三寳願齋官子孫昌熾世出賢明至心稽首正真三寳願齋官罪累蕩除福慧圎滿至心稽首正真三寳願天下太平萬姓安樂至心稽首正真三寳願一切衆生免離諸苦同入正真至心稽首得道衆聖平坐如法施食呪願曰此受食呪一切作福田施食最為先見世受快樂過去得生天當來居淨土衣食常自然是故今供養普獻於諸天食遍齊供手呪曰香厨妙供上獻天尊中獻真聖下及衆生普同飽滿福流齋官如水歸海食訖施食懴食曰上啓十方天尊敬白見前大衆弟子今日所營齋供或恐手觸不淨衣服不淨器物不淨米麥不淨事事種種多不如法願三寳弘慈布施歡喜殘有供具廻施一切當願施者得福食者无罪齋官捻香供養如法唱讃詠如法為諸來生作善因縁如蒙開悟仰受聖恩次齋官持淨施云布施呪願上啓十方三寳一切真聖齋官某甲為某事設齋已訖猶恐功徳未圎更捨淨財廻施三寳當願布施巳後七祖生天見存快樂世世生生得福无量次唱持念人各恭敬至心稽首太上三尊十方衆聖願齋官百福裝嚴萬善歸集至心稽首正真三寳以此設齋功徳資被群生離苦觧脫至心稽首禮得道衆聖科曰凡一中齋依此儀違奪筭一千六百中㑹儀入道户呪漱捻香叩齒並如行道法發鑪呪曰无上三天玄元始氣太上老君召出臣身中三五功曹左右官使者侍香玉童傳言玉女五帝直符各三十六人出關啓此間土地里域真官正神今故燒香願得太上十方正真妙氣降注臣身中令所啓速逹俓詣至真无極道前稱名位太上靈寳洞玄法師某嶽真人某上啓太上无極大道至真无上三十六部尊經玄中大法師三界官屬一切威靈今故燒香願以是功徳歸流某家九玄七祖見前人口乞丐原赦前生今身一切所犯元逆醜惡兆罪億過悉乞除蕩即願亡者上生天堂衣飯自然見存災消禍滅長居福慶善縁之中門户清貴子孫昌熾世世享祚萬願從心今故燒香克獲感通俓至无極道前至心稽首東方无極太上靈寳天尊十方同次南次西次北次東北次東南次西南次西北次上方次下方誦三契頌至心稽首太上无極大道至心稽首三十六部尊經至心稽首玄中大法師重稱名位太上洞玄靈寳法師某嶽真人某上啓太上无極大道三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切真靈某等今故捻香願為某懴謝无量劫來至于今日生死宿罪重過或違天犯地輕慢三寳殺害衆生罵詈呪詛嫉妬慳貪邪婬放蕩愚癡竊盜口是心非三業六根罪愆无量因今首謝並乞消除願亡者生天見存安樂子孫昌熾福慶自然暨乎天下地上五苦三塗咸岀幽牢俱蒙惠潤凡諸有識並入道場謹啓二上香復鑪呪曰香官使者左右龍虎君侍香諸靈官當令此間朝㑹之所自然生金液丹碧芝英百靈衆真交㑹集在香火案前十方仙童玉女侍衛香煙傳奏臣向來言啓俓至无極道前旋行頌出道以齋為先勤行登金闕故設大法橋普度諸人物宿世恩徳報道心超然發身飛昇玄都七祖咸解脫科曰凡中㑹依此儀違奪筭一千六百度人儀齋時未至應度人列階下西面辤父母謝九玄合十二拜次北面拜天子四拜所以者冠帶天尊法服更不復拜父母國君故也於此入道之際須辤謝耳既訖拱手端身北向三歸三寳三禮至心歸身太上无極大道至心歸神三十六部尊經至心歸命玄中大法師廻面西禮監度三師各三拜訖便長跪先保舉師為著法裙次監度師為著雲䄂次度師為著法帔然後便為戴法冠畢退禮三師三拜北面執簡端立師面東平立誦智慧三首其詞曰智慧起本无朗朗超十方結空峙玄霄諸天挹流芳其妙難思議虚感真實通有有竟不有无无无不容智慧恒觀身學道之所先眇𦕈入玄津自然録我神天尊常擁護魔王為保言晃晃金剛軀迢迢太上清智慧生戒根真道戒為主三寳由是興髙聖所崇受汎此不死舟倐歘濟大有當此說戒時諸天並稽首每至首終齊唱善禮一拜總訖廻身禮十方從北始至心歸命北方无極太上靈寳天尊十方同次東次南次西次東南次東北次西南次西北次上方次下方次退居東面西師西面東向爲說十戒新度人皆稱名受天尊言善男子善女子能發自然道意来入法何受我十戒則為大道清信弟子皆與勇猛飛天齊功於是不退可得超凌三界得為上清真人汝當伏受諦聴在心一者不殺當念衆生二者不婬妄行邪念三者不盜取非義財四者不欺善惡反論五者不醉常思淨行六者宗親和睦无有非親七者見人善事心助歡喜八者見人有憂助為作福九者彼來加我志在不報十者一切未得道我不有望天尊言修奉清戒每合天心常行大慈願為一切慊慊尊教不敢中怠寧守善而死不為惡而生於此不退可得㧞度五道不履三惡長齋奉戒自得度世新度人禮師三拜北向禮二尊三拜誦奉戒頌其詞曰道為无心宗一切作福田立功无定主本願各由人虚己應衆生注心莫不均大聖弘至教亦由雨降天髙陵靡不周常卑故成淵海為百川王是能合龍鱗萬劫保智用豈但在厥年奉戒不暫𧇊世世善結縁精思念大乗㑹當體道真科曰凡度人依此儀違奪筭一千二百科曰凡八儀道士女冠行事所要指擿時須集成此卷當依而奉之違四司考魂不復名上道科奪筭二千四百洞玄靈寳三洞奉道科戒營始卷之六
