front:
  text: 洞玄靈寳三洞奉道科戒營始卷之二儀四
  hash: sha256:3e53681ad8c9cfc9d262455cf672b6025d97526b33b368e32ce92bb807923e10
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0027_HFL_002-001a, image: hfl/0760/0760-166.png}
body:
  text: 造像品科曰夫大像無形至真無色湛然空寂視聴莫偕而應變見身暫顯還隱所以存真者係想聖容故以丹青金碧摹圖形相像彼真容飾兹鉛粉凡厥繫心皆先造像有六種相宜按奉行一者先造无上法王元始天尊太上虚皇玉晨大道髙上老子太一天尊二者造大羅巳下太清巳上三清無量聖真仙相三者造過見未來無邊聖相四者造繪諸天星斗真仙五者造聖真仙品無數聖相六者造隨感應縁無窮聖真形相如此發心有一十八種以狀真容一者雕諸寳玉瓊瑶琅玕七珍之𩔖二者鑄以黃金三者鑄以白銀四者鑄以赤銅五者鑄以青鐵六者鑄以錫鑞七者雕諸香物栴檀沉水之屬八者織成九者繡成十者泥塑十一者夾紵十二者素畫十三者壁畫十四者鑿龕十五者鎸諸文石十六者建碑十七者香泥印成十八者印紙範泥刻甎圑土鏤瓦磨骨雕牙剸木聚雪畫灰一念發心得福無量或長一寸二寸三寸四寸五寸乃至於尺大小無礙多少不限暨乎一尺二尺三尺四尺五尺以及于丈一丈二丈三丈四丈五丈六丈百尺千尺萬尺一區十區百區千區萬區一鋪十鋪百鋪千鋪萬鋪一龕十龕百龕千龕萬龕一㡧十㡧百㡧千㡧萬㡧一座十座百座千座萬座一室十室百室千室萬室一堂十堂百堂千堂萬堂乃至巨億兆京載或一天尊二天尊乃至十百千萬億兆京載并真人仙人聖人玉童玉女諸天帝王金剛神王香官使者侍香龍虎獅子辟邪殿堂帳座幡華幡蓋飛天音樂種種侍衛各隨心力以用供養禮拜燒香晝夜存念如對真形過去未來獲福無量克成真道科曰凡造像皆依經具其儀相天尊有五百億相道君有七十二相老君有三十二相真人有二十四相衣冠華座並須如法天尊上帔以九色離羅或五色雲霞山水雜錦黃裳金冠玉冠左右皆纓絡環珮亦金玉冠綵色間錯上帔皆不得用純紫丹青碧緑等真人又不得散髪長耳獨角並須戴芙蓉飛雲元始等冠復不得戴二儀平冠鹿胎之屬左右二真皆供獻或持經執簡把諸香華悉須恭肅不得放誕手足衣服偏斜天尊平坐指捻太无手中皆不執如意塵拂但空而巳科曰凡天尊道君老君左右皆有真人玉童玉女侍香侍經香官使者左右龍虎君左右官使者天丁力士金剛神王獅子辟邪龍麟猛獸螣蛇神虎鳳凰孔雀金翅朱雀四靈八威護法善神備衛左右各隨力所建科曰真人名號極多不可稱數皆是昔劫種因道成果極所致得在天尊道君老君左右侍衛啓請變化自在天尊所處皆隨侍衛科曰玉童玉女皆是道氣化生非因胎育各有司存或侍經侍香或散華奉言或給仙人或侍得道階品亦有差降科曰侍經侍香皆是結氣而生常在天尊及真經所處傳奏流通記列善惡科曰金剛天之四極神立天之四隅或天門地户長一千二百丈按劍持杖身掛天衣飛雲寳冠足躡巨山神獸大石諸鬼之上立作殺鬼之勢主天下地上一切非法鬼神怒目噉聲邪精畏伏若天尊都治門戸殿堂左右皆立其像防護守衛變化無方不常厥體是道之烈氣所生非胎誕而得也今之觀内門户殿堂經藏並制其像也科曰神王者衆神之主凡有三種一者結氣二者報生三者業因結氣者不由胎誕因自然之氣報生者從諸鬼神有功於道生得此身業報者承其積劫因縁主令身執凡人成真得道皆來監度神王之名抑亦無數皆衣甲冠矛持刀按劒或立或坐不常其體役御群鬼驅除凶惡具諸經誥不復詳備科曰魔王赤神王之流凡有三種一者三天魔王二者五帝魔王三者飛天魔王皆戒錬保舉學道行人故大勲魔王保舉爾身也科曰天丁力士龍虎左右香官使者並因氣化生應縁而出降魔召鬼傳言驛行護法之靈官也科曰八威謂毒龍猛虎騰蛇電獸長牙奔牛玃天雷晶並是積業惡物天尊威伏使備門守關洞穴牆圻防非也科曰四靈謂龜龍麟鳳皆應星辰異氣合五行之秀或口誦靈文身生圖籙知代休否因時下世並天尊苑囿祥禽瑞獸也科曰凡天尊法座凡有八種一者千葉蓮華二者五色獅子三者七寶金牀四者九層玉座五者伏九龍六者摧八毒七者坐雲霄八者御煙霞皆隨變現形因機居住今之帳座但以七寳八珍珠玉金碧装飾擬像而巳非所備也科曰凡諸天尊道君老君及諸聖真仙相年乆時深或風雨飄零浸損皆以時修復勿使真容彫墜當得福無量科曰凡天尊形像金銅寳玉者每至月十五日設齋香湯洗飾若夾紵雕木即揩拭使光淨最得功徳寫經品科曰經者聖人垂教叙録流通勸化諸天出生衆聖因經悟道因悟成真開度五億天人教化三千國土作登真之徑路為出世之因縁萬古常行三清永式結飛玄之氣散太紫之章或鳳篆龍書瓊文寳籙字方一丈八角垂芒文成十部三乗奧㫖藏諸雲帙閉以霞扄使三洞分門四輔殊統寔天人之良藥為生死之法橋使衆生普超五濁之津俱登六度之岸者也凡有十二相以造真經一者金簡刻文二者銀版篆字三者平石鐫書四者木上作字五者素書六者漆書七者金字八者銀字九者竹簡十者壁書十一者紙書十二者葉書或古或今或篆或𨽻或取天書玉字或象雲氣金章八體六書從心所欲復以總别二門遍生歸向總者盡三洞寳藏窮四輔玄文具上十二相總寫流通别者或一字一句或卷或袠隨我本心廣寫供養書寫精妙紙墨鮮明裝潢絛軸函笥藏舉燒香禮拜永劫供養得福無量不可思議科曰夫經皆須作藏凡藏有二種一者總藏二者别藏總藏者三洞四輔同作一藏上下或在右前後作重級各安題目三洞寳經藏别藏者三洞四輔各作一藏凡有七種一者大洞真經藏二者洞玄寳經藏三者洞神仙經藏四者太玄經藏五者太平經藏六者太清經藏七者正一經藏皆明題目以相甄别若次安之若各藏如並藏法皆安經臺或天尊殿當陽左右間左三洞右四輔每藏皆作臺舉之不得正爾頓地巾帕袠藴如法置几案香鑪龍璧燒香明燈存念並須得所藏之大小皆在時之所制不復為常度人品科日夫道以人弘教因師得若不度人則法橋路斷所以弘教先在度人度人之相凡有十二種一者帝子天孫二者大臣宰輔三者皇后妃主四者聦明智慧五者識量明敏六者富貴男女七者形相端嚴八者仁信淳厚九者行業精苦十者講誦精熟十一者勇猛精進十二者凡厥有心擇此十二度使出家下自一人上至億載紹隆法教宣揚經傳又有二十五種相可使出家一者家世奉道信樂經法二者見世奉道信樂經法三者巳身奉道信樂經法四者家世淳善信奉正真五者見世淳善信奉正真六者巳身淳善信奉正真七者經業優長八者行業精苦九者鍊氣斷穀十者專誡於道十一者誓弘大道十二者志宣經教十三者習道來乆十四者清淨身心十五者無健羡心十六者無世間愛著心十七者無世間勝負心十八者無世間憎慢心十九者無世間矯妄心二十者無世間毀譽心二十一者運心舉意唯欲出家二十二者願得出家紹隆正法二十三者願得出家捨身命財唯在於道二十四者願得出家為帝王國主天下地上君臣吏人建大福利二十五者願得出家為一切衆生作生死福田講說大乗廣開愚暗悉使悟道復有十種不得使出家一者背臣逆子二者刑戮子孫三者殺師叛道四者不信大法五者屠沽婬慾六者偷盜姦矯七者飲酒食肉八者不識罪福宿命因縁九者形容不具足十者凡厥兇頑有此十種勿使出家損道威儀破壞法教又有二十五相不合入道一者家世誹謗不信經法二者見世誹謗不信經法三者已身誹謗不信經法四者家世浮偽不奉正真五者見世浮偽不奉正真六者巳身浮偽不奉正真七者貪酒嗜肉八者心不奉道九者破壞大道十者不念經法十一者躭習色慾十二者專求俗事十三者身心穢惡十四者心懷健羡十五者心有是非十六者愛著聲色十七者有世間勝負十八者有世間憎慢十九者常懐矯妄二十者常思放蕩二十一者無心奉法二十二者唯貪世利二十三者捉心不專二十四者惰慢不謹二十五者但利於巳不利一切度人之時依科㨂擇必須合法方可出家或為國主帝王或為天地日月或為宗廟社稷或為父母巳身或爲妻子眷屬或為亡人或為見存或初登位或新誕育或為八表不安或為四生有識或風雨不順或星宿乖違或兆人疫毒或榖稼水旱種種福田度人為上度人功徳不可思議科曰凡出家有三十相一者常行精進於世無染二者常行勇猛於道不退三者常行慈悲不殺衆生四者常行愍念濟度群品五者常行忍辱不懐瞋怒六者常行歡喜導引一切七者常發善心紹隆三寳八者常發大心修營靈觀九者常發大心宣揚經教十者常願發心開導一切使歸正道十一者常願發心講說大乗開悟愚暗十二者常願發心為帝王國主建大福利十三者常願發心為宰輔大臣作諸福田十四者常願發心為一切衆生並皆離苦十五者常願國王萬夀國土安寧十六者常願天下太平五穀豐熟十七者常願經教大弘普得悟觧十八者常願天下衆生遍皆囬向大道十九者常持齋戒心心不退二十者常奉經法念念修行二十一者常對天尊燒香行道二十二者廣寫經教散布人間二十三者廣修靈觀使一切回向二十四者願我法身堅固不退二十五者大作福田遍及一切二十六者廣行乞取造諸功徳二十七者廣運慈心濟度群品二十八者廣行慈悲施惠一切二十九者常持法相不捨威儀三十者普為三塗地獄以無上妙法使悉昇度永免幽苦以此三十事為出家法相常願過去未來見在三世念念不退常在法身永不休懈紹隆大道作一切衆生無量福利使一切世間若有識若無識一切衆生成無上道科曰凡道士女冠出家之後先須綱紀整齊法教凡有五種一擇其道行淳厚心常營法不私其巳願成就者二擇其清廉正直不犯於物志建福田者三擇其徳行髙逺明閑法教道俗歸依善方便者四擇其妙識時務令於世宜而不違經教者五擇其勤苦善能營始利益法門者擇此五者立為綱紀整齊法教以為弘軌若於中有一行損於法門則不可立復有虚妄之人矯立名行情求潤已者最不可立又有真淳謹心不願樂如此之人詳其可否復有十種不可彊立一不信宿命罪福因縁者二不知羞恥唯欲利身者三恃勢貴豪情不潤衆者四運心舉意唯損常住者五毎有施為常作機心者六不解經戒復不敬者七不識時事狠戾自用者八外清内濁外愚内智外真内偽外㢘内貪外口是内心非者九雖不損衆亦不利衆虚沾法位者十因沾法位自欲宜便恃此紀綱專求私利者有此十事不得居於此職若不依此科簡阿曲𥙷舉同情之人減筭三千六百科曰又有二十五事綱紀法徒可常遵奉一者不得指三寳財物生欺負心二者不得於常住衆物生欺負心三者不得於四輩施物生欺負心四者不得於諸大徳尊者生凌忽心五者不得於中年時輩生凌忽心六者不得於諸下座晚生生凌忽心七者不得於諸下賤生凌忽心八者身奉科戒施為不犯九者善能和悦撫接上下十者巧以方便導引法徒十一者於諸利益深識機宜十二者於諸三寳心常住持十三者於常住處恒不破壞十四者舍受非識不生憎愛十五者於諸法衆無偏頗心十六者於諸事宜不自專擅十七者内心正直不犯於物十八者毎事發心皆願成就十九者凡諸財物毫分不犯二十者凡於三寳常住皆欲利益裝嚴二十一者善逹機宜和恱世事令不毀壞三寳二十二者能營護法衆不使外犯二十三者常教法衆使依科戒二十四者能得貴賤内外歸依前心後心堅固如一二十五者廣運誠心成就法門令不破不壞為永劫福田作當來衆生種善窟宅以此二十五事綱紀法門成就功徳當令過去見在未來獲福無量科曰又有三十事不可綱紀法門檢校常住一者常於三寳財物生欺負心二者常於常住衆物生欺負心三者常於四輩施物生欺負心四者於諸大徳尊者常生凌忽五者於諸中年時輩常生凌忽六者於諸下座晚生常生凌忽七者身違科戒施為皆犯八者於諸上下不能和恱九者於諸法徒不能導引十者於諸利益不能方便十一者於三寳處心不住持十二者於常住處常欲破壞十三者不容非議生憎愛心十四者於諸法衆心不均普十五者於諸事宜常能自用十六者姦詐所為矯妄十七者每事發心皆不成就十八者凡諸財物毫分必取十九者凡於三寳常住皆不利益唯潤於已二十者不識機宜違戾世事令外衆侵犯損壞三寳二十一者不能營護法衆益加非法二十二者不教法徒多違科戒二十三者破内外貴賤歸依心二十四者前心後心竟無定法二十五者運心偏曲永無成就令法門破壞損失福田二十六者依附勢豪經紀賣易三寳二十七者依託法門自取聲利穢汙經教二十八者賣三寳力縱恣是非二十九者聞人彈議彌行非法三十者侵損三寳常住自恣身心凡三十事有一不可若犯當來生中在畜鳥獸任人殺活永失人道見世盲聾瘖瘂手攣足跛形容不具足若道士女冠當明識此科戒依行勿犯科曰凡道士女冠為綱紀者須依法奉行勤宣科戒教示徒衆若犯科者各依法罰香油鳴鐘禮拜如再犯不悛當致重役若使營修觀内又彊梁不順者決以法科擯還本主必使愚人向道不犯科戒皆當執正不得偏曲敗亂科典違者減筭二千四百洞玄靈寳三洞奉道科戒營始卷之二
