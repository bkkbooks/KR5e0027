front:
  text: 洞玄靈寳三洞奉道科戒營始卷之五六同卷
  hash: sha256:8c875d171eb781f661abd2b6ce9be73fc83734be7476cef30c3386cff2d8e6af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0027_HFL_005-001a, image: hfl/0761/0761-046.png}
body:
  text: 上清大洞真經目上清大洞真經三十九章一卷上清太上隱書金真玉光一卷上清八素真經服日月皇華一卷上清飛歩天剛躡行七元一卷上清九真中經黄老祕言一卷上清上經變化七十四方一卷上清除六天文三天正法一卷上清黄氣陽精三道順行一卷上清外國放品青童内文二卷上清金闕上記靈書紫文一卷上清紫度炎光神玄變經一卷上清青要紫書金根上經一卷上清玉精真訣三九素語一卷上清三九玉檢三元布經一卷上清石精金光藏景録形一卷上清丹景道精隱地八術上下二卷上清神洲七轉七變舞天經一卷上清大有八素大丹隱書一卷上清天關三圗七星移度一卷上清九丹上化胎精中記一卷上清太上六甲九赤班符一卷上清神虎上符消魔智慧一卷上清曲素訣詞五行祕符一卷上清白羽黒翮飛行羽經一卷上清素奏丹符靈飛六甲一卷上清玉珮金璫太極金書一卷上清九靈太妙龜山元録三卷上清七聖玄紀徊天九霄一卷上清太上黄素四十四方一卷上清太霄琅書瓊文帝章一卷此三十四卷玉清紫清太清大洞經限是王君授南真上清髙上滅魔洞景金玄玉清隱書四卷上清太微天帝君金虎真符一卷上清太微天帝君神虎玉經真符一卷上清太上黄庭内景玉經太帝内書一卷右七卷紫虚元君南嶽上真魏夫人在世受經限上清三元齋儀二卷上清傳授儀一卷上清告盟儀一卷上清朝儀一卷上清投簡文一卷登真隱訣二十五卷真誥十卷八真七傳七卷洞真觀身三百大戒文一卷右受稱无上洞真法師上清經總一百五十卷上清太素交帶上清玄都交帶上清白紋交帶上清紫紋交帶一曰廻車交帶亦謂畢道劵又名元始大劵右受稱上清玄都大洞三景弟子死上三洞法師科曰道士女冠參受經戒法籙須依此次第名位不得叨謬受法之日師宜詳審分明示其品目違奪筭三千六百科曰道士女冠受經戒已皆當誦其戒文使精熟毎至月一日十五日三十日總集法堂遞相簡閱三犯不通罰香五斤違奪筭一千二百科曰道士女冠所受經戒法籙皆依目抄寫裝禙入藏置經堂靜室或閣如法具龍璧幡花真文朝夕供養禮懴不得輕慢洩穢傳付他人常當誦念轉讀若身之後門人同學校録供養不得洩慢其正一符籙及諸劵契函盛隨亡師所在山谷或墓内别作坎安置餘皆不得輒隨身去所以者真經寳重靈官侍奉尸朽之穢寧可近之此最至慎違魂謫三官殃及七世子孫各明慎之科曰道士女冠總兼前法備修行者啓奏之曰稱上清玄都大洞三景弟子奉行靈寳自然昇玄法師某嶽某帝真人三皇洞神洞淵神呪大宗三昧小兆真人臣某上啓或再拜若正一法備稱太玄都正一平氣係天師陽平治太上中氣領二十四生氣督察二十四治三五大都功正一盟威元命真人臣甲再拜上言若叨僣此位魂考三官奪筭總盡慎之慎之法服圖儀科曰服以象徳儀形道士女冠威儀之先叅佩經法各須具備一如本法不得叨謬違奪筭三千六百正一法師玄冠黄裙絳褐絳帔二十四條列圖如左髙玄法師玄冠黄裙黄褐黄帔二十八條列圖如左洞神法師玄冠黄裙青褐黄帔三十二條列圖如左洞玄法師芙蓉冠黄褐黄裙紫帔三十二條列圖如左洞真法師元始冠青裙紫褐紫帔青裏表二十四條裏十五條列圖如左大洞法師元始冠黄裙紫褐如上清法五色雲霞帔列圖如左三洞講法師元始冠黄褐絳裙九色離羅帔列圖如左科曰道士女冠若不備此法衣皆不得輕動寳經具其法服皆有神童侍衛正一法衣將軍五人力士八人侍衛髙玄法服神童神女各二人侍衛洞神法衣天男天女各三人侍衛洞玄法衣玉童玉女各八人侍衛洞真大洞三洞法衣玉童玉女各十二人侍衛總謂之法服違侍童逺身四司考魂減筭二千四百科曰凡道士女冠欲參經法皆預備法衣既告齋傳法位訖即須冠帶法服執簡稱名位拜其本師朝謁太上違靈官不附身魂考五帝奪筭一千二百科曰女冠法服衣褐並同道士唯冠異制法用玄紗前後左右皆三葉不安逺遊若上清大洞女冠冠飛雲鳳氣之冠今列圖如左山居法師法服二儀冠上下黄裙帔三十六條列圖如左凡常道士法服平冠上下黄裙帔二十四條列圖如左凡常女冠法服玄冠上下黄裙帔十八條列圖如左科曰凡道士女冠履屨或用草或以木或純漆布帛純絹漫飾衣帔皆二儀或山像内外朴素不得綵飾華綺違奪筭一千四百科曰凡履下皆有龍虎神伏夜安版簀牀几上不得正爾頓地及履厠溷違奪筭八百二十科曰簮用牙角竹玉任依時制皆不得雕鏤為異形像違奪筭八百二十科曰道士女冠法衣皆不得冐犯穢惡假借他人須箱篋藏揲冠履亦然違奪筭一千二百洞玄靈寳三洞奉道科戒營始卷之五
